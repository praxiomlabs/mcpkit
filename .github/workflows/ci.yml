name: CI

on:
  # Only run on pushes to the trunk; feature/fix/refactor branches get CI via
  # their pull request instead, so a branch with an open PR runs CI once, not
  # twice (a push-event run plus a pull_request-event run).
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded in-progress runs for the same PR/branch so rapid pushes
# don't pile up and contend for runners. Pushes to the default branch are not
# cancelled (so post-merge runs always complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ==========================================================================
  # Change detection - lets PRs that touch no Rust/build files skip the heavy
  # compile/test/semver jobs. Pushes to the trunk always run everything (the
  # `|| github.event_name == 'push'` guards below), so trunk coverage is never
  # reduced by this filter.
  # ==========================================================================

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - '**/build.rs'
              - 'crates/mcpkit-transport/proto/**'
              - 'deny.toml'
              - '.github/workflows/ci.yml'

  # ==========================================================================
  # Fast checks - run first, fail fast
  # ==========================================================================

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          # PR branches restore the trunk cache but don't save their own
          # (per-branch caches just churn the 10 GB ceiling). Only the
          # default-branch run writes the shared cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --all-features --all-targets -- -D warnings

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo check --all-features --all-targets

  version-sync:
    name: Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check documentation versions match Cargo.toml
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mcpkit") | .version')
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

          echo "Checking documentation references mcpkit version $MAJOR_MINOR..."
          FAIL=0

          # Every snippet-bearing doc must reference the current version at
          # least once (umbrella crate or subcrate — all published mcpkit-*
          # crates share the workspace version).
          for f in README.md docs/getting-started.md docs/client-guide.md \
                   docs/extensions.md docs/runtimes.md docs/wasm.md \
                   docs/migration-from-rmcp.md; do
            if ! grep -qE "mcpkit(-[a-z]+)? = \"$MAJOR_MINOR\"" "$f"; then
              echo "ERROR: $f does not reference mcpkit(-*) = \"$MAJOR_MINOR\""
              FAIL=1
            fi
          done

          # No doc may pin any OTHER mcpkit version — this catches partially
          # bumped files, which the per-file presence check alone would pass.
          # Allowlisted: files where old versions are intentional (migration
          # rollback targets, stability policy examples, point-in-time ADRs).
          STALE=$(grep -rnE "mcpkit(-[a-z]+)? = \"[0-9]" README.md docs/ \
              --exclude=migration-to-1.0.md \
              --exclude=api-stability.md \
              --exclude-dir=adr \
            | grep -vE "mcpkit(-[a-z]+)? = \"$MAJOR_MINOR\"" || true)
          if [ -n "$STALE" ]; then
            echo "ERROR: stale mcpkit version references (expected $MAJOR_MINOR):"
            echo "$STALE"
            FAIL=1
          fi

          if [ "$FAIL" -ne 0 ]; then
            exit 1
          fi
          echo "All version references are correct!"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --max-retries 6
            --retry-wait-time 3
            --accept 200,204,206
            --exclude "^https://crates.io"
            --exclude "^https://docs.rs"
            --exclude "^https://www.reddit.com"
            --exclude "^https://cliffle.com"
            --exclude "^https://img.shields.io"
            './docs/**/*.md'
            './README.md'
            './CONTRIBUTING.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Core tests - run after fast checks pass
  # ==========================================================================

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [changes, fmt, clippy, check]
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test --all-features
      # trybuild spins up a throwaway cargo project under target/tests; remove it
      # so the rust-cache save step doesn't trip over its torn-down scratch dirs
      # (harmless ENOENT annotations otherwise).
      - name: Remove trybuild scratch before cache save
        if: always()
        shell: bash
        run: rm -rf target/tests

  # ==========================================================================
  # Code Coverage - runs on the trunk (push) only. Keeping it off the PR path
  # removes ~8.5 min of interactive wait; the trunk run still publishes the
  # coverage trend to Codecov and warms the (branch-scoped) coverage cache.
  # ==========================================================================

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Remove trybuild scratch before cache save
        if: always()
        shell: bash
        run: rm -rf target/tests

  # ==========================================================================
  # Security & compliance
  # ==========================================================================

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  # ==========================================================================
  # Documentation
  # ==========================================================================

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [changes, fmt, clippy, check]
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings

  # ==========================================================================
  # MSRV - Minimum Supported Rust Version
  # ==========================================================================

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    needs: [changes, fmt, clippy, check]
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Only check library code compiles with MSRV, not tests/dev-dependencies
      # (wiremock 0.6+ requires Rust 1.87 for let chains)
      - run: cargo check --all-features --lib -p mcpkit

  # ==========================================================================
  # Cross-platform matrix - PRs only, and only when code changed (skip docs PRs)
  # ==========================================================================

  test-matrix:
    name: Test (${{ matrix.os }})
    needs: [changes, test]
    if: ${{ github.event_name == 'pull_request' && needs.changes.outputs.code == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      # Use --features full instead of --all-features to exclude regenerate-proto
      # (protobuf-src fails to build on Windows due to abseil-cpp linker issues)
      - run: cargo test -p mcpkit-transport --features full
      # --all-features here is safe: regenerate-proto is only reachable through
      # mcpkit-transport (excluded), so the rest of the workspace gets its
      # feature-gated code (e.g. jwt) exercised cross-platform.
      - run: cargo test --workspace --exclude mcpkit-transport --all-features
      - name: Remove trybuild scratch before cache save
        if: always()
        shell: bash
        run: rm -rf target/tests

  # ==========================================================================
  # Semver check - ensure no accidental breaking changes
  # ==========================================================================

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    needs: [changes, fmt, clippy, check]
    # Run on code-changing PRs (compare against the published baseline), and on
    # pushes to the trunk. The trunk run seeds the per-package baseline-rustdoc
    # cache that the action shares back to PRs: GitHub caches are branch-scoped,
    # so the cache has to be written on the default branch to be restorable by
    # PR branches. Docs-only changes skip this (no API can change).
    if: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && needs.changes.outputs.code == 'true' }}
    steps:
      - uses: actions/checkout@v6
      # The official action caches each publishable crate's baseline rustdoc
      # across runs, so the unchanging published baseline is not rebuilt on every
      # PR (which was ~half the job). It installs the toolchain and checks the
      # whole workspace (skipping `publish = false` crates) by default.
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          rust-toolchain: "1.96"
          verbose: true

  # ==========================================================================
  # Aggregate gate - a single job that summarizes the required checks. Mark
  # THIS job as the required status check on the branch protection rule: it
  # stays green when heavy jobs are legitimately skipped (e.g. docs-only PRs)
  # and fails if any required job failed or was cancelled, so path-filtering
  # never deadlocks a required check.
  # ==========================================================================

  ci-success:
    name: CI Success
    if: ${{ always() }}
    needs:
      [
        changes,
        fmt,
        clippy,
        check,
        version-sync,
        link-check,
        test,
        deny,
        docs,
        msrv,
        test-matrix,
        semver,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required job did not pass (result: $r)"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped."
