name: CI

on:
  # Only run on pushes to the trunk; feature/fix/refactor branches get CI via
  # their pull request instead, so a branch with an open PR runs CI once, not
  # twice (a push-event run plus a pull_request-event run).
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded in-progress runs for the same PR/branch so rapid pushes
# don't pile up and contend for runners. Pushes to the default branch are not
# cancelled (so post-merge runs always complete).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # ==========================================================================
  # Fast checks - run first, fail fast
  # ==========================================================================

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features --all-targets -- -D warnings

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features --all-targets

  version-sync:
    name: Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check documentation versions match Cargo.toml
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mcpkit") | .version')
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

          echo "Checking documentation references mcpkit version $MAJOR_MINOR..."

          # Check README.md
          if ! grep -q "mcpkit = \"$MAJOR_MINOR\"" README.md; then
            echo "ERROR: README.md does not reference mcpkit = \"$MAJOR_MINOR\""
            exit 1
          fi

          # Check getting-started.md
          if ! grep -q "mcpkit = \"$MAJOR_MINOR\"" docs/getting-started.md; then
            echo "ERROR: docs/getting-started.md does not reference mcpkit = \"$MAJOR_MINOR\""
            exit 1
          fi

          echo "All version references are correct!"

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --max-retries 6
            --retry-wait-time 3
            --accept 200,204,206
            --exclude "^https://crates.io"
            --exclude "^https://docs.rs"
            --exclude "^https://www.reddit.com"
            --exclude "^https://cliffle.com"
            --exclude "^https://img.shields.io"
            './docs/**/*.md'
            './README.md'
            './CONTRIBUTING.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Core tests - run after fast checks pass
  # ==========================================================================

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [fmt, clippy, check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      # trybuild spins up a throwaway cargo project under target/tests; remove it
      # so the rust-cache save step doesn't trip over its torn-down scratch dirs
      # (harmless ENOENT annotations otherwise).
      - name: Remove trybuild scratch before cache save
        if: always()
        shell: bash
        run: rm -rf target/tests

  # ==========================================================================
  # Code Coverage - PRs only (to save CI minutes)
  # ==========================================================================

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Remove trybuild scratch before cache save
        if: always()
        shell: bash
        run: rm -rf target/tests

  # ==========================================================================
  # Security & compliance
  # ==========================================================================

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check all

  # ==========================================================================
  # Documentation
  # ==========================================================================

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [fmt, clippy, check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings

  # ==========================================================================
  # MSRV - Minimum Supported Rust Version
  # ==========================================================================

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    needs: [fmt, clippy, check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      # Only check library code compiles with MSRV, not tests/dev-dependencies
      # (wiremock 0.6+ requires Rust 1.87 for let chains)
      - run: cargo check --all-features --lib -p mcpkit

  # ==========================================================================
  # Cross-platform matrix - PRs only (to save CI minutes)
  # ==========================================================================

  test-matrix:
    name: Test (${{ matrix.os }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      # Use --features full instead of --all-features to exclude regenerate-proto
      # (protobuf-src fails to build on Windows due to abseil-cpp linker issues)
      - run: cargo test -p mcpkit-transport --features full
      # --all-features here is safe: regenerate-proto is only reachable through
      # mcpkit-transport (excluded), so the rest of the workspace gets its
      # feature-gated code (e.g. jwt) exercised cross-platform.
      - run: cargo test --workspace --exclude mcpkit-transport --all-features
      - name: Remove trybuild scratch before cache save
        if: always()
        shell: bash
        run: rm -rf target/tests

  # ==========================================================================
  # Semver check - ensure no accidental breaking changes
  # ==========================================================================

  semver:
    name: Semver Check
    runs-on: ubuntu-latest
    needs: [fmt, clippy, check]
    # Only run on PRs (not pushes to main) to compare against baseline
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks
      - name: Check semver
        # Check every publishable crate, not just the umbrella. `--workspace`
        # skips crates marked `publish = false` (examples, benches, fuzz, the
        # macros test crate), leaving the published crates whose API consumers
        # depend on directly.
        run: cargo semver-checks check-release --workspace
