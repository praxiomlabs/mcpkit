name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mcpkit") | .version')
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Cargo.toml version ($CARGO_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Run tests
        run: cargo test --all-features

      - name: Run clippy
        # Uses workspace lint configuration from Cargo.toml
        # -D warnings treats warnings as errors in CI
        run: cargo clippy --all-features --all-targets -- -D warnings

  publish:
    name: Publish to crates.io
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.96
      - uses: Swatinem/rust-cache@v2

      # Publish crates in dependency order
      # Order matters: each crate must have its dependencies published first
      # mcpkit-macros has mcpkit-server as a dev-dependency, so server must come first
      # A real publish failure aborts the release. The only tolerated error is
      # "already uploaded", so re-running after a partial publish skips the
      # crates already on crates.io instead of masking every failure (the old
      # `continue-on-error: true` hid genuine errors on all but the last crate).
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail

          publish() {
            echo "::group::publish $1"
            local out status
            out=$(cargo publish -p "$1" 2>&1); status=$?
            echo "$out"
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              return 0
            fi
            if echo "$out" | grep -qiE "already (exists|uploaded)"; then
              echo "::notice::$1 already published at this version — skipping"
              return 0
            fi
            echo "::error::failed to publish $1"
            exit 1
          }

          # Let the crates.io index propagate before publishing dependents.
          wait_index() { echo "waiting 30s for crates.io index..."; sleep 30; }

          publish mcpkit-core
          wait_index
          publish mcpkit-transport
          wait_index
          publish mcpkit-server
          wait_index
          publish mcpkit-macros
          wait_index
          publish mcpkit-client
          wait_index
          publish mcpkit-testing
          wait_index
          publish mcpkit-axum
          wait_index
          publish mcpkit-actix
          wait_index
          publish mcpkit-rocket
          wait_index
          publish mcpkit-warp
          wait_index
          publish mcpkit

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: mcpkit v${{ steps.version.outputs.version }}
          body: |
            ## Installation

            ```toml
            [dependencies]
            mcpkit = "${{ steps.version.outputs.version }}"
            ```

            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Links

            - [crates.io](https://crates.io/crates/mcpkit/${{ steps.version.outputs.version }})
            - [docs.rs](https://docs.rs/mcpkit/${{ steps.version.outputs.version }})
            - [Full Changelog](https://github.com/praxiomlabs/mcpkit/blob/main/CHANGELOG.md)
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
