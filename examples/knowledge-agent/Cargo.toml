[package]
name = "knowledge-agent"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Self-evolving knowledge agent demonstrating full mcpkit capabilities"
publish = false

[dependencies]
# Core MCP protocol
mcpkit-core = { path = "../../crates/mcpkit-core" }
mcpkit-server = { path = "../../crates/mcpkit-server" }
mcpkit-transport = { path = "../../crates/mcpkit-transport" }
mcpkit-macros = { path = "../../crates/mcpkit-macros" }

# Forge orchestration layer
mcpkit-provider = { path = "../../crates/mcpkit-provider" }
mcpkit-template = { path = "../../crates/mcpkit-template", features = ["derive", "runtime"] }
mcpkit-memory = { path = "../../crates/mcpkit-memory" }
mcpkit-embedding = { path = "../../crates/mcpkit-embedding" }
mcpkit-chain = { path = "../../crates/mcpkit-chain" }
mcpkit-agent = { path = "../../crates/mcpkit-agent" }
mcpkit-rag = { path = "../../crates/mcpkit-rag" }
mcpkit-eval = { path = "../../crates/mcpkit-eval" }

# Async runtime
tokio = { version = "1.44", features = ["full"] }
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
uuid = { version = "1.0", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2.0"

[[bin]]
name = "knowledge-agent"
path = "src/main.rs"
